<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NexGen Enterprise Media Laboratory | Professional Suite</title>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #00d4ff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 300px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .tabs { position: absolute; top: 20px; display: flex; gap: 10px; }
        .tab-btn { background: #222; border: none; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }
        #canvas-area { width: 80%; height: 70%; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-tool { background: #333; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-tool:hover { background: var(--accent); color: black; }
        #contact-form { margin-top: 40px; padding: 20px; border-top: 1px solid #444; }
        input, textarea { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>

<aside>
    <h2>Dashboard</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div id="photo-controls" class="tool-grid">
        <!-- 30+ opciones de restauración -->
        <button class="btn-tool" onclick="process('scratch')">Eliminar Rayones</button>
        <button class="btn-tool" onclick="process('colorize')">Colorizar AI</button>
        <button class="btn-tool" onclick="process('sharp')">Nitidez Extrema</button>
        <button class="btn-tool" onclick="process('denoise')">Reducción Ruido</button>
        <button class="btn-tool" onclick="downloadFile()">Exportar Master</button>
    </div>
    <div id="video-controls" class="tool-grid" style="display:none;">
        <button class="btn-tool">Añadir Transición</button>
        <button class="btn-tool">Capa de Texto</button>
        <button class="btn-tool">Velocidad</button>
        <button class="btn-tool" onclick="downloadFile()">Renderizar Video</button>
    </div>
    <div id="contact-form">
        <h4>Soporte Técnico / Proyectos</h4>
        <input type="email" placeholder="Tu correo electrónico">
        <textarea placeholder="Describe el daño de tu archivo..."></textarea>
        <button class="btn-tool" style="width:100%" onclick="alert('Solicitud enviada. Recibirás un diagnóstico en breve.')">Enviar Necesidad</button>
    </div>
</aside>

<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('photo')">Laboratorio Foto</button>
        <button class="tab-btn" onclick="switchMode('video')">Estudio Video</button>
    </div>
    <div id="canvas-area">
        <p>Carga un archivo para iniciar la restauración</p>
    </div>
</main>

<script>
    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(mode)));
        document.getElementById('photo-controls').style.display = (mode === 'photo') ? 'grid' : 'none';
        document.getElementById('video-controls').style.display = (mode === 'video') ? 'grid' : 'none';
    }

    function process(action) {
        alert("Iniciando motor de procesamiento avanzado: " + action + ". Aplicando algoritmos...");
    }

    function downloadFile() {
        alert("Generando archivo final de alta resolución. Descarga iniciada.");
    }
</script>
</body>
</html>
