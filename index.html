<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPro Edit | Professional Multimedia Suite</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">NEXUSPRO</div>
        <nav>
            <button onclick="ExportManager.init()">Exportar Proyecto</button>
        </nav>
    </header>

    <aside class="sidebar-tools">
        <div class="tool-group">
            <h3>Edición</h3>
            <button data-tool="brush">Pincel</button>
            <button data-tool="mask">Máscara</button>
        </div>
        <div class="tool-group">
            <h3>AI Engine</h3>
            <button id="gen-fill-btn">Relleno Generativo</button>
        </div>
    </aside>

    <main class="viewport">
        <canvas id="mainCanvas"></canvas>
        
        <section id="timeline" class="timeline-container">
            <div class="track" id="video-track"></div>
            <div class="track" id="audio-track"></div>
        </section>
    </main>

    <aside class="sidebar-props">
        <div class="property-panel">
            <h3>Ajustes</h3>
            <label>Brillo
                <input type="range" data-control="brightness" min="0" max="200" value="100">
            </label>
            <label>Contraste
                <input type="range" data-control="contrast" min="0" max="200" value="100">
            </label>
        </div>
    </aside>

    <section id="contact-modal" class="hidden">
        <form id="contactForm">
            <input type="email" id="userEmail" required placeholder="Tu correo corporativo">
            <button type="submit">Enviar reporte</button>
        </form>
    </section>

    <script type="module" src="js/app.js"></script>
</body>
</html>
