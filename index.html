<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLingua V310 - Acceso Protegido</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        :root {
            --primary: #8b5cf6; --accent: #06b6d4; --dark: #0f172a; --panel: #1e293b;
            --text: #f1f5f9; --green: #22c55e; --red: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .layout { display: flex; width: 100%; height: 100%; }
        
        /* IZQUIERDA */
        .left-panel { width: 400px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .brand { font-size: 1.4rem; font-weight: 900; color: var(--accent); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;}
        .config-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        input, select { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 4px; width: 100%; font-size: 0.85rem; }
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 0.8rem; transition: 0.2s; flex: 1; }
        button:active { transform: scale(0.98); }
        .btn-green { background: var(--green); } .btn-blue { background: #3b82f6; } .btn-red { background: var(--red); }
        .btn-purple { background: var(--primary); } .btn-orange { background: #f59e0b; color: black; }
        .btn-trash-small { flex: 0 0 40px; background: var(--red); font-size: 1.2rem; }

        /* LISTA */
        .list-header { font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between; margin-top:5px; }
        .words-list-container { flex: 1; overflow-y: auto; background: #0f172a; border: 1px solid #334155; border-radius: 5px; padding: 5px; }
        .list-item { padding: 8px 10px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; display: flex; justify-content: space-between; cursor: pointer; align-items: center; }
        .list-item:hover { background: #1e293b; }
        .list-item.active { background: var(--primary); color: white; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .dot-red { background: var(--red); } .dot-green { background: var(--green); }

        /* DERECHA */
        .right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .flashcard { width: 100%; max-width: 750px; height: 85vh; background: #1e293b; border: 1px solid #334155; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .img-area { flex: 4; background: #000; display: flex; align-items: center; justify-content: center; }
        .real-img { width: 100%; height: 100%; object-fit: contain; }
        .info-area { flex: 3; padding: 10px 30px; text-align: center; }
        .word-en { font-size: 3.5rem; font-weight: 900; margin: 0; color: white; }
        .word-es { font-size: 2.2rem; color: var(--accent); margin: 5px 0; font-weight: bold; }
        .sentence-area { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; text-align: left; }
    </style>
</head>
<body>

<div id="loginModal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:30px; border-radius:15px; width:90%; max-width:400px; border:1px solid #06b6d4; text-align:center;">
        <h2 style="color:#06b6d4; margin-bottom:20px;">Acceso NeuroLingua</h2>
        <input type="text" id="userName" placeholder="Nombre completo" style="margin-bottom:10px; display:block;">
        <input type="tel" id="userPhone" placeholder="WhatsApp (Ej: 81 1234 5678)" style="margin-bottom:10px; display:block;">
        <input type="email" id="userEmail" placeholder="Correo electrónico" style="margin-bottom:20px; display:block;">
        <button class="btn-green" style="width:100%; padding:15px;" onclick="validateAccess()">INGRESAR AHORA 🚀</button>
    </div>
</div>

<div class="layout">
    <div class="left-panel">
        <div class="brand">NEURO LINGUA V310</div>
        <div class="config-box">
            <button class="btn-purple" style="width:100%" onclick="openModal()">📝 CARGAR LISTA</button>
        </div>
        <div class="list-header"><span>PALABRAS</span></div>
        <div id="visualList" class="words-list-container"></div>
    </div>

    <div class="right-panel">
        <div class="flashcard">
            <div class="img-area"><img id="cardImg" class="real-img" src="https://via.placeholder.com/800x600?text=NeuroLingua" alt="Imagen"></div>
            <div class="info-area">
                <h1 id="wordEn" class="word-en">Bienvenido</h1>
                <div id="wordEs" class="word-es">Ingresa tus datos...</div>
                <div class="sentence-area">
                    <span id="sentEn" style="font-style:italic;">Esperando datos de acceso.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function validateAccess() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const email = document.getElementById('userEmail').value;

        if (name && phone && email) {
            localStorage.setItem('NEO_USER_DATA', JSON.stringify({name, phone, email}));
            document.getElementById('loginModal').style.display = 'none';
        } else {
            alert("⚠️ Debes completar todos los campos para continuar.");
        }
    }

    window.addEventListener('load', () => {
        if (localStorage.getItem('NEO_USER_DATA')) {
            document.getElementById('loginModal').style.display = 'none';
        }
    });

    function openModal() { alert("Funcionalidad de carga activa."); }
</script>
</body>
</html>
