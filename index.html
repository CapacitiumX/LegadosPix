<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Vision Studio - Funcional</title>
    <style>
        /* Variables y Reset Base */
        :root {
            --bg-primary: #0a0a0c; --bg-secondary: #141417; --bg-tertiary: #1f1f23;
            --text-main: #f3f3f4; --text-muted: #8b8b93;
            --accent-primary: #6366f1; --accent-hover: #4f46e5;
            --border-light: rgba(255, 255, 255, 0.08);
            --font-main: system-ui, -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg-primary); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        button { cursor: pointer; border: none; outline: none; font-family: inherit; }

        /* Header */
        header { height: 60px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .brand { font-weight: bold; font-size: 1.2rem; background: linear-gradient(90deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs-container { display: flex; background: var(--bg-tertiary); border-radius: 8px; padding: 4px; }
        .tab-btn { background: transparent; color: var(--text-muted); padding: 8px 24px; border-radius: 6px; font-weight: 500; transition: 0.3s; }
        .tab-btn.active { background: var(--bg-secondary); color: var(--text-main); }
        .btn-export { background: var(--accent-primary); color: white; padding: 8px 20px; border-radius: 6px; font-weight: 600; }

        /* Workspaces */
        main { flex: 1; display: flex; position: relative; }
        .workspace { display: none; width: 100%; height: 100%; }
        .workspace.active { display: flex; }

        /* Sidebar UI */
        .sidebar { width: 300px; background: var(--bg-secondary); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; overflow-y: auto; }
        .panel-section { padding: 20px; border-bottom: 1px solid var(--border-light); }
        .panel-title { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
        
        /* Sliders & Botones */
        .slider-container { margin-top: 15px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-tool { background: var(--bg-tertiary); border: 1px solid var(--border-light); color: white; padding: 12px; border-radius: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-tool:hover { border-color: var(--accent-primary); }
        .btn-action { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-light); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* Centro de Edición */
        .editor-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #000; position: relative; }
        .upload-area { width: 100%; max-width: 600px; height: 300px; border: 2px dashed var(--border-light); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; background: var(--bg-secondary); }
        .upload-area:hover { border-color: var(--accent-primary); }
        
        /* Media Elements */
        #photo-preview { max-width: 100%; max-height: 80vh; display: none; transition: filter 0.1s; }
        .video-wrapper { position: relative; width: 100%; max-width: 800px; display: none; }
        video { width: 100%; border-radius: 8px; background: black; }
        
        /* Controles de Video */
        .video-controls { width: 100%; max-width: 800px; background: var(--bg-secondary); padding: 12px 20px; border-radius: 8px; display: none; align-items: center; gap: 15px; margin-top: 15px; border: 1px solid var(--border-light); }
        .ctrl-btn { background: none; color: white; font-size: 1.2rem; width: 30px; }
        .time-display { font-size: 0.85rem; font-family: monospace; color: var(--text-muted); }
        .progress-bar { flex: 1; height: 6px; background: var(--bg-tertiary); border-radius: 3px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent-primary); width: 0%; border-radius: 3px; pointer-events: none; }

        /* Texto Dinámico (Video) */
        .overlay-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); cursor: text; outline: none; border: 1px dashed transparent; padding: 5px; }
        .overlay-text:focus { border-color: var(--accent-primary); }
    </style>
</head>
<body>

    <header>
        <div class="brand">✨ AURA STUDIO</div>
        <div class="tabs-container">
            <button class="tab-btn active" data-target="photo-lab">Lab. Fotografía</button>
            <button class="tab-btn" data-target="video-studio">Estudio de Video</button>
        </div>
        <button class="btn-export">Exportar Proyecto</button>
    </header>

    <main>
        <section id="photo-lab" class="workspace active">
            <aside class="sidebar">
                <div class="panel-section">
                    <h3 class="panel-title">Filtros Rápidos</h3>
                    <div class="tool-grid">
                        <button class="btn-tool" onclick="applyPreset('grayscale(100%)')">B & N</button>
                        <button class="btn-tool" onclick="applyPreset('sepia(80%)')">Vintage</button>
                        <button class="btn-tool" onclick="applyPreset('saturate(200%)')">Vibrante</button>
                        <button class="btn-tool" onclick="applyPreset('none')">Original</button>
                    </div>
                </div>
                <div class="panel-section">
                    <h3 class="panel-title">Ajustes Manuales</h3>
                    
                    <div class="slider-container">
                        <div class="slider-label"><span>Brillo</span> <span id="val-bright">100%</span></div>
                        <input type="range" id="slide-bright" min="0" max="200" value="100">
                    </div>
                    
                    <div class="slider-container">
                        <div class="slider-label"><span>Contraste</span> <span id="val-cont">100%</span></div>
                        <input type="range" id="slide-cont" min="0" max="200" value="100">
                    </div>

                    <div class="slider-container">
                        <div class="slider-label"><span>Saturación</span> <span id="val-sat">100%</span></div>
                        <input type="range" id="slide-sat" min="0" max="200" value="100">
                    </div>
                </div>
            </aside>

            <div class="editor-center">
                <div class="upload-area" id="photo-upload-area" onclick="document.getElementById('photo-input').click()">
                    <h2>📥 Cargar Fotografía</h2>
                    <p>Haz clic para seleccionar un archivo</p>
                    <input type="file" id="photo-input" hidden accept="image/*">
                </div>
                <img id="photo-preview" src="" alt="Vista previa">
            </div>
        </section>

        <section id="video-studio" class="workspace">
            <aside class="sidebar">
                <div class="panel-section">
                    <h3 class="panel-title">Herramientas de Video</h3>
                    <button class="btn-action" onclick="document.getElementById('video-input').click()">
                        📁 Cargar Video Nuevo
                        <input type="file" id="video-input" hidden accept="video/*">
                    </button>
                    <button class="btn-action" id="add-text-btn">
                        📝 Agregar Texto Dinámico
                    </button>
                    <button class="btn-action" onclick="document.getElementById('main-video').currentTime = 0">
                        ⏮ Reiniciar Video
                    </button>
                </div>
            </aside>

            <div class="editor-center">
                <div class="upload-area" id="video-upload-area" onclick="document.getElementById('video-input').click()">
                    <h2>📥 Cargar Video</h2>
                    <p>Haz clic para seleccionar un archivo MP4/WebM</p>
                </div>

                <div class="video-wrapper" id="video-wrapper">
                    <video id="main-video"></video>
                </div>

                <div class="video-controls" id="video-controls">
                    <button class="ctrl-btn" id="play-pause-btn">▶</button>
                    <span class="time-display" id="time-display">00:00 / 00:00</span>
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- NAVEGACIÓN POR PESTAÑAS ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.workspace').forEach(w => w.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        // ==========================================
        // LÓGICA DE FOTOGRAFÍA FUNCIONAL
        // ==========================================
        const photoInput = document.getElementById('photo-input');
        const photoUploadArea = document.getElementById('photo-upload-area');
        const photoPreview = document.getElementById('photo-preview');
        
        // Carga real de la imagen usando URL temporal
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                photoPreview.src = URL.createObjectURL(file);
                photoUploadArea.style.display = 'none';
                photoPreview.style.display = 'block';
                resetSliders();
            }
        });

        // Motor de filtros CSS combinados en tiempo real
        const sBright = document.getElementById('slide-bright');
        const sCont = document.getElementById('slide-cont');
        const sSat = document.getElementById('slide-sat');

        function updateFilters() {
            document.getElementById('val-bright').innerText = sBright.value + '%';
            document.getElementById('val-cont').innerText = sCont.value + '%';
            document.getElementById('val-sat').innerText = sSat.value + '%';
            
            photoPreview.style.filter = `brightness(${sBright.value}%) contrast(${sCont.value}%) saturate(${sSat.value}%)`;
        }

        [sBright, sCont, sSat].forEach(slider => {
            slider.addEventListener('input', updateFilters);
        });

        function applyPreset(filterString) {
            if(filterString === 'none') {
                resetSliders();
            } else {
                photoPreview.style.filter = filterString;
            }
        }

        function resetSliders() {
            sBright.value = 100; sCont.value = 100; sSat.value = 100;
            updateFilters();
        }

        // ==========================================
        // LÓGICA DE VIDEO FUNCIONAL
        // ==========================================
        const videoInput = document.getElementById('video-input');
        const videoUploadArea = document.getElementById('video-upload-area');
        const videoWrapper = document.getElementById('video-wrapper');
        const mainVideo = document.getElementById('main-video');
        const videoControls = document.getElementById('video-controls');
        
        const playPauseBtn = document.getElementById('play-pause-btn');
        const timeDisplay = document.getElementById('time-display');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        // Formatear segundos a MM:SS
        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        };

        // Carga real del video
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                mainVideo.src = URL.createObjectURL(file);
                videoUploadArea.style.display = 'none';
                videoWrapper.style.display = 'block';
                videoControls.style.display = 'flex';
                
                // Limpiar textos dinámicos anteriores si se carga nuevo video
                document.querySelectorAll('.overlay-text').forEach(el => el.remove());
            }
        });

        // Play / Pause Funcional
        playPauseBtn.addEventListener('click', () => {
            if (mainVideo.paused) {
                mainVideo.play();
                playPauseBtn.innerText = '⏸';
            } else {
                mainVideo.pause();
                playPauseBtn.innerText = '▶';
            }
        });

        // Actualizar tiempo y barra de progreso
        mainVideo.addEventListener('timeupdate', () => {
            if(mainVideo.duration) {
                const current = mainVideo.currentTime;
                const duration = mainVideo.duration;
                
                timeDisplay.innerText = `${formatTime(current)} / ${formatTime(duration)}`;
                progressFill.style.width = `${(current / duration) * 100}%`;
            }
        });

        // Clic en la barra para adelantar/atrasar
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percentage = clickX / width;
            
            mainVideo.currentTime = percentage * mainVideo.duration;
        });

        // Insertar Texto Dinámico Funcional
        document.getElementById('add-text-btn').addEventListener('click', () => {
            if(videoWrapper.style.display !== 'block') {
                alert("Sube un video primero para agregar texto.");
                return;
            }
            
            const textEl = document.createElement('div');
            textEl.contentEditable = true;
            textEl.className = 'overlay-text';
            textEl.innerText = "Escribe aquí...";
            
            // Para que no se active el play del video al hacer click en el texto
            textEl.addEventListener('click', (e) => e.stopPropagation());
            
            videoWrapper.appendChild(textEl);
            textEl.focus();
        });

    </script>
</body>
</html>
